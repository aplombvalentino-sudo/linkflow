# webapp-spec.yaml â€” linkflow (generated 20260713)
# Authored by prompt-engineer-agent / webapp-prompter. Consumed by webapp-builder-agent.
# Option A architecture is pre-filled. Replace TODOs; keep the structure.

app:
  name: "linkflow"
  slug: "linkflow"            # used for the Vercel project name webapp-{slug}-{YYYYMMDD}
  one_liner: "TODO: one-sentence pitch"
  monetization_model: "subscription"   # subscription|freemium|one-time|usage-based|marketplace
  landing_page_angle: "TODO: main conversion hook"

# ---- PAGES (routes + components) â€” Option A ----
pages:
  landing:                         # /  (public, Server Components)
    route: "/"
    sections: [hero, features, pricing, social_proof, blog_teaser, cta, footer]
    components: [Hero, FeatureGrid, PricingTable, Testimonials, CTA, SiteFooter]
  dashboard:                       # /dashboard/*  (auth-gated by middleware)
    route: "/dashboard"
    pages:
      - { route: "/dashboard", component: "DashboardHome", states: [empty, loading, error] }
      # - { route: "/dashboard/settings", component: "Settings" }
  legal:                           # /legal/*  (auto-generated by legal-compliance-agent)
    routes: ["/legal/privacy", "/legal/terms", "/legal/cookies"]
  auth:
    routes: ["/login", "/signup", "/auth/callback"]

# ---- DATA MODEL (Supabase) â€” RLS REQUIRED on every user-data table ----
data_model:
  tables:
    - name: profiles
      columns:
        - { name: id, type: "uuid", pk: true, references: "auth.users(id)" }
        - { name: full_name, type: "text" }
        - { name: created_at, type: "timestamptz", default: "now()" }
      rls:
        enabled: true
        policies:
          - "select: auth.uid() = id"
          - "update: auth.uid() = id"
    # - name: items  (add your domain tables; each needs rls.enabled: true)

# ---- AUTH ----
auth:
  provider: "supabase"
  methods: ["email"]               # add "google","github", magic-link, etc.
  protected_prefix: "/dashboard"

# ---- API ROUTES (route handlers + Server Actions) ----
api_routes:
  - { path: "/api/user/export", method: "GET", auth: true, purpose: "RGPD data export (JSON)" }
  - { path: "/api/user/delete", method: "DELETE", auth: true, purpose: "RGPD hard-delete" }
  # - { path: "/api/stripe/webhook", method: "POST", auth: false, purpose: "Stripe events" }

# ---- LEGAL CONFIG (drives auto-generated /legal pages) ----
legal_pages_config:
  company_name: "${NEXT_PUBLIC_COMPANY_NAME}"
  contact_email: "${NEXT_PUBLIC_CONTACT_EMAIL}"
  governing_law: "French law"
  data_types_collected: ["email", "name", "usage_analytics"]   # keep truthful
  cookies_used:
    essential: ["sb-access-token", "sb-refresh-token"]
    analytics: []                  # e.g. ["_ga"] â€” only with consent
    marketing: []

# ---- DESIGN DIRECTIONS (from ui-ux-pro-max: scripts/search.py) ----
design:
  style: "TODO (e.g. minimal-saas, bento, glassmorphism)"
  palette: "TODO (ui-ux-pro-max palette id)"
  font_pairing: "TODO (ui-ux-pro-max pairing id)"
  component_lib: "shadcn/ui"

# ---- MONETIZATION (Stripe â€” only if billing required) ----
monetization:
  enabled: false
  tiers: []                        # [{ name: Pro, price_id: price_xxx, features: [...] }]
